<div id="session-list">
  {% for s in sessions %}
    <a class="row{% if s.status == 'active' %} is-active{% endif %}"
       hx-get="/sessions/{{ s.id }}" hx-target="#session-detail" hx-swap="innerHTML"
       href="#">
      <span class="session-number">#{{ s.number }}</span>
      <span class="session-title">{{ s.title }}</span>
      <span class="chip">{{ s.status }}</span>
    </a>
  {% else %}
    <p class="muted">No sessions yet.</p>
  {% endfor %}
</div>
