{% extends "base.html" %}
{% block title %}Combat — Hexforge{% endblock %}
{% block content %}
<section class="combat two-pane">
  <aside class="roster panel">
    <div class="roster-head">
      <h1>Combat</h1>
    </div>
    <form class="roster-filter" hx-post="/combat" hx-target="#encounter-list" hx-swap="innerHTML">
      <input class="input" type="text" name="name" placeholder="New encounter…" required>
      <button class="btn btn-primary" type="submit">+</button>
    </form>
    <div id="encounter-list">{% include "_encounter_list.html" %}</div>
  </aside>
  {% include "_tracker.html" %}
</section>
{% endblock %}
{% block scripts %}
<script src="/static/vendor/sortable.min.js" defer></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  function encId() {
    var t = document.getElementById("tracker");
    return t ? t.getAttribute("data-encounter-id") : null;
  }
  function initSortable() {
    var list = document.getElementById("combatant-rows");
    if (list && window.Sortable && !list.dataset.sortable) {
      list.dataset.sortable = "1";
      Sortable.create(list, {
        handle: ".drag-handle",
        onEnd: function () {
          var ids = Array.prototype.slice
            .call(list.querySelectorAll("[data-id]"))
            .map(function (el) { return el.getAttribute("data-id"); });
          var id = encId();
          if (id) {
            htmx.ajax("POST", "/combat/" + id + "/reorder", {
              target: "#tracker", swap: "outerHTML", values: { order: ids.join(",") },
            });
          }
        },
      });
    }
  }
  // Refetch the tracker when a combat_changed signal arrives for the shown encounter.
  var wsEnc = null;
  function wireWS() {
    var id = encId();
    if (id && id !== wsEnc && window.HexWS) {
      wsEnc = id;
      HexWS.connect("combat:" + id);
    }
  }
  if (window.HexWS) {
    HexWS.on("combat_changed", function (payload, msg) {
      if (String(msg.encounter_id) === String(encId())) {
        document.body.dispatchEvent(new CustomEvent("combatChanged"));
      }
    });
  }

  initSortable();
  wireWS();
  document.body.addEventListener("htmx:afterSwap", function () {
    initSortable();
    wireWS();
  });
});
</script>
{% endblock %}
